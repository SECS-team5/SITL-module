services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  verifier:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY src/ ./src/
        COPY schemas/ ./schemas/
        CMD ["python", "src/verifier.py"]
    depends_on:
      - kafka
    environment:
      KAFKA_SERVERS: kafka:29092
      COMMAND_TOPIC: sitl/commands
      INPUT_TOPICS: sitl/commands,sitl-drone-home
      HOME_TOPIC: sitl-drone-home
      OUTPUT_TOPIC: sitl-verified-messages

  controller:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY src/ ./src/
        COPY schemas/ ./schemas/
        CMD ["python", "src/controller.py"]
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
      INPUT_TOPIC: sitl-verified-messages
      COMMAND_TOPIC: sitl/commands
      HOME_TOPIC: sitl-drone-home

  core:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY src/ ./src/
        COPY schemas/ ./schemas/
        CMD ["python", "src/core.py"]
    depends_on:
      - redis
      - kafka
    environment:
      KAFKA_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
      UPDATE_FREQUENCY_HZ: 10.0
      POSITION_REQUEST_TOPIC: sitl/position/request
      POSITION_RESPONSE_TOPIC: sitl/position/response
