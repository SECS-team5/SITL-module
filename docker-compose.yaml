services:
  # --- Infrastructure ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sitl-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sitl-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sitl-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Application Services ---
  verifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sitl-verifier
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_SERVERS: kafka:9092
      INPUT_TOPICS: "sitl.commands,sitl-drone-home"
      COMMAND_TOPIC: sitl.commands
      HOME_TOPIC: sitl-drone-home
      VERIFIED_COMMAND_TOPIC: sitl.verified-commands
      VERIFIED_HOME_TOPIC: sitl.verified-home
    restart: unless-stopped

  controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sitl-controller
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      VERIFIED_COMMAND_TOPIC: sitl.verified-commands
      VERIFIED_HOME_TOPIC: sitl.verified-home
      STATE_TTL_SEC: "7200"
    restart: unless-stopped

  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sitl-core
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      UPDATE_FREQUENCY_HZ: "10.0"
      STATE_TTL_SEC: "7200"
    restart: unless-stopped

  messaging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sitl-messaging
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      POSITION_REQUEST_TOPIC: sitl.telemetry.request
      POSITION_RESPONSE_TOPIC: sitl.telemetry.response
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: sitl-network
