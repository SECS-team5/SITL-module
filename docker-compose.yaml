services:
  sitl_verifier:
    image: sitl-module-verifier:latest
    container_name: sitl-verifier
    entrypoint: [""]
    command: ["sh", "-c", "pip install -q kafka-python aiohttp && python -u -m components.sitl_verifier"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BROKER_BACKEND: ${BROKER_BACKEND:-kafka}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      INPUT_TOPICS: ${INPUT_TOPICS:-sitl.commands,sitl-drone-home}
      COMMAND_TOPIC: ${COMMAND_TOPIC:-sitl.commands}
      HOME_TOPIC: ${HOME_TOPIC:-sitl-drone-home}
      VERIFIED_COMMAND_TOPIC: ${VERIFIED_COMMAND_TOPIC:-sitl.verified-commands}
      VERIFIED_HOME_TOPIC: ${VERIFIED_HOME_TOPIC:-sitl.verified-home}
      COMPONENT_ID: sitl-verifier
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

  sitl_controller:
    image: sitl-module-controller:latest
    container_name: sitl-controller
    entrypoint: [""]
    command: ["sh", "-c", "pip install -q kafka-python aiohttp && python -u -m components.sitl_controller"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BROKER_BACKEND: ${BROKER_BACKEND:-kafka}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      VERIFIED_COMMAND_TOPIC: ${VERIFIED_COMMAND_TOPIC:-sitl.verified-commands}
      VERIFIED_HOME_TOPIC: ${VERIFIED_HOME_TOPIC:-sitl.verified-home}
      STATE_TTL_SEC: ${STATE_TTL_SEC:-7200}
      COMPONENT_ID: sitl-controller
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

  sitl_core:
    image: sitl-module-core:latest
    container_name: sitl-core
    entrypoint: [""]
    command: ["sh", "-c", "pip install -q kafka-python aiohttp && python -u -m components.sitl_core"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      UPDATE_FREQUENCY_HZ: ${UPDATE_FREQUENCY_HZ:-10.0}
      STATE_TTL_SEC: ${STATE_TTL_SEC:-7200}
      COMPONENT_ID: sitl-core
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

  sitl_messaging:
    image: sitl-module-messaging:latest
    container_name: sitl-messaging
    entrypoint: [""]
    command: ["sh", "-c", "pip install -q kafka-python aiohttp && python -u -m components.sitl_messaging"]
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BROKER_BACKEND: ${BROKER_BACKEND:-kafka}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_QOS: ${MQTT_QOS:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      POSITION_REQUEST_TOPIC: ${POSITION_REQUEST_TOPIC:-sitl.telemetry.request}
      POSITION_RESPONSE_TOPIC: ${POSITION_RESPONSE_TOPIC:-sitl.telemetry.response}
      COMPONENT_ID: sitl-messaging
      INFOPANEL_URL: ${INFOPANEL_URL:-https://infopanel.csse.ru/api}
      INFOPANEL_API_KEY: ${INFOPANEL_API_KEY:-your-api-key-here}
      INFOPANEL_SERVICE: ${INFOPANEL_SERVICE:-SITL}
      INFOPANEL_SERVICE_ID: ${INFOPANEL_SERVICE_ID:-5}
    restart: unless-stopped

networks:
  default:
    name: sitl-network
