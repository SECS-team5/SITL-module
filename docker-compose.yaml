services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep 'Zookeeper version' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:29092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 12
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  verifier:
    restart: on-failure
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY src/ ./src/
        COPY schemas/ ./schemas/
        CMD ["python", "src/verifier.py"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_SERVERS: kafka:29092
      COMMAND_TOPIC: sitl-commands
      INPUT_TOPICS: sitl-commands,sitl-drone-home
      HOME_TOPIC: sitl-drone-home
      VERIFIED_COMMAND_TOPIC: sitl-verified-commands
      VERIFIED_HOME_TOPIC: sitl-verified-home

  controller:
    restart: on-failure
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY src/ ./src/
        COPY schemas/ ./schemas/
        CMD ["python", "src/controller.py"]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
      VERIFIED_COMMAND_TOPIC: sitl-verified-commands
      VERIFIED_HOME_TOPIC: sitl-verified-home
      STATE_TTL_SEC: 7200

  core:
    restart: on-failure
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY src/ ./src/
        COPY schemas/ ./schemas/
        CMD ["python", "src/core.py"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
      UPDATE_FREQUENCY_HZ: 10.0
      POSITION_REQUEST_TOPIC: sitl-position-request
      POSITION_RESPONSE_TOPIC: sitl-position-response
      STATE_TTL_SEC: 7200
